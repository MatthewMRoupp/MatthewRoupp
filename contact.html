<section class="section" id="contact-form">
  <div class="container">

    <div class="section-head">
      <h2>Contact Form</h2>
      <p class="section-sub">
        If you have questions about my projects, certifications, or technical work,
        you can send me a message using the form below.
      </p>
    </div>

    <form class="card" action="#" method="post">

      <div class="grid two">

        <div>
          <label for="name"><strong>Name</strong></label><br>
          <input
            type="text"
            id="name"
            name="name"
            required
            aria-required="true"
            style="width:100%; padding:10px; margin-top:4px;"
          >
        </div>

        <div>
          <label for="email"><strong>Email Address</strong></label><br>
          <input
            type="email"
            id="email"
            name="email"
            required
            aria-required="true"
            style="width:100%; padding:10px; margin-top:4px;"
          >
        </div>

      </div>

      <div style="margin-top:16px;">
        <label for="subject"><strong>Subject</strong></label><br>
        <input
          type="text"
          id="subject"
          name="subject"
          style="width:100%; padding:10px; margin-top:4px;"
        >
      </div>

      <div style="margin-top:16px;">
        <label for="message"><strong>Message</strong></label><br>
        <textarea
          id="message"
          name="message"
          rows="6"
          required
          aria-required="true"
          style="width:100%; padding:10px; margin-top:4px;"
        ></textarea>
      </div>

      <div class="button-row" style="margin-top:16px;">
        <button class="btn primary" type="submit">Send Message</button>
        <button class="btn ghost" type="reset">Clear Form</button>
      </div>

    </form>

  </div>
</section>
